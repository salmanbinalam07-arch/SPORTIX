<!DOCTYPE html>
<html>
<head>
  <title>SPORTIX Admin</title>
</head>
<body>

<h2>SPORTIX Admin Login</h2>

<input type="email" id="email" placeholder="Admin Email">
<br><br>

<input type="password" id="password" placeholder="Password">
<br><br>

<button onclick="login()">Login</button>

<p id="message"></p>

<script>
function login(){
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  if(email && password){
    document.getElementById("message").innerHTML = "Login checking...";
  } else {
    document.getElementById("message").innerHTML = "Email and password required";
  }
}
</script>

</body>
</html>
