<!DOCTYPE html>
<html>
<head>
  <title>SPORTIX Admin</title>
</head>

<body>

<h1>SPORTIX Admin</h1>

<div id="loginBox">

<input type="email" id="email" placeholder="Admin Email">
<br><br>

<input type="password" id="password" placeholder="Password">
<br><br>

<button id="loginBtn">Login</button>

<p id="msg"></p>

</div>


<div id="dashboard" style="display:none;">

<h2>SPORTIX Dashboard</h2>

<input type="text" id="title" placeholder="Match Title">
<br><br>

<input type="text" id="team1" placeholder="Team 1">
<br><br>

<input type="text" id="team2" placeholder="Team 2">
<br><br>

<input type="text" id="time" placeholder="Match Time">
<br><br>

<input type="text" id="link" placeholder="Live Link">
<br><br>

<select id="status">
  <option value="live">Live</option>
  <option value="upcoming">Upcoming</option>
  <option value="finished">Finished</option>
</select>

<br><br>

<button>Add Match</button>

</div>



<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";


const firebaseConfig = {
  apiKey: "AIzaSyAn7HUDfK0luw6PtqfBSMkfokNJ18N43z4",
  authDomain: "sportix-3ad91.firebaseapp.com",
  projectId: "sportix-3ad91",
  storageBucket: "sportix-3ad91.firebasestorage.app",
  messagingSenderId: "1067249243356",
  appId: "1:1067249243356:web:ff1b423010f7cedaa21019"
};


const app = initializeApp(firebaseConfig);
const auth = getAuth(app);



document.getElementById("loginBtn").onclick = () => {

  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;


  signInWithEmailAndPassword(auth, email, password)

  .then(() => {

    document.getElementById("msg").innerHTML = "Login Success";

    document.getElementById("loginBox").style.display = "none";

    document.getElementById("dashboard").style.display = "block";

  })

  .catch((error) => {

    document.getElementById("msg").innerHTML = error.message;

  });

};


</script>

</body>
</html>
