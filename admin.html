<!DOCTYPE html>
<html>
<head>
  <title>SPORTIX Admin</title>
</head>

<body>

<h1>SPORTIX Admin</h1>

<input type="email" id="email" placeholder="Admin Email">
<br><br>

<input type="password" id="password" placeholder="Password">
<br><br>

<button id="loginBtn">Login</button>

<p id="msg"></p>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";


const firebaseConfig = {
  apiKey: "আপনার apiKey",
  authDomain: "sportix-3ad91.firebaseapp.com",
  projectId: "sportix-3ad91",
  storageBucket: "sportix-3ad91.firebasestorage.app",
  messagingSenderId: "1067249243356",
  appId: "1:1067249243356:web:ff1b423010f7cedaa21019"
};


const app = initializeApp(firebaseConfig);
const auth = getAuth(app);


document.getElementById("loginBtn").onclick = () => {

  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, password)
  .then(() => {
    document.getElementById("msg").innerHTML = "Login Success";
  })
  .catch((error) => {
    document.getElementById("msg").innerHTML = error.message;
  });

};

</script>

</body>
</html>
